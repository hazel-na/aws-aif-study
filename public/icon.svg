<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0369A1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- 구름 형태 -->
  <g fill="white" opacity="0.15">
    <ellipse cx="256" cy="200" rx="140" ry="60"/>
    <ellipse cx="180" cy="220" rx="80" ry="50"/>
    <ellipse cx="330" cy="215" rx="85" ry="48"/>
  </g>

  <!-- 메인 텍스트: AIF -->
  <text x="256" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="148" fill="white" text-anchor="middle" letter-spacing="-4">AIF</text>

  <!-- 하단 서브텍스트 -->
  <text x="256" y="370" font-family="Arial, sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle" opacity="0.85" letter-spacing="6">합격앱</text>

  <!-- 상단 AWS 로고 느낌의 작은 텍스트 -->
  <text x="256" y="155" font-family="Arial, sans-serif" font-weight="600" font-size="38" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="8">AWS</text>

  <!-- 체크마크 뱃지 -->
  <circle cx="390" cy="122" r="48" fill="#22C55E"/>
  <polyline points="369,122 385,138 411,108" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
